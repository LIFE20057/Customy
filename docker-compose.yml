services:
  customy:
    build:
      context: .
      dockerfile: Dockerfile
      # Multi-arch build (uncomment for Raspberry Pi ARM64 cross-build from x86 host)
      # platforms:
      #   - linux/arm64
      #   - linux/amd64
    image: customy:latest
    container_name: customy
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "${HTTPS_PORT:-3443}:3443"
    volumes:
      # Persistent website files – survives container restarts
      - ./site:/app/site
      # SSL certificates – mount your certs here
      - ./certs:/app/certs:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - customy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Optional: nginx reverse proxy (uncomment to enable)
    # depends_on:
    #   - nginx

  # ─── Optional nginx reverse proxy ─────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: customy-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - customy
  #   networks:
  #     - customy-net

networks:
  customy-net:
    driver: bridge
