<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Customy</title>
  <meta name="description" content="Sign in to Customy – your AI-first self-hosted CMS" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrapper { width: 100%; max-width: 400px; padding: 2rem; }
    .login-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2.5rem; justify-content: center; }
    .login-logo .logo-icon { width: 44px; height: 44px; background: var(--accent-gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .login-logo .logo-text { font-size: 1.8rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
    .login-card h1 { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); margin: 0 0 0.5rem; }
    .login-card p { color: var(--text-muted); font-size: 0.9rem; margin: 0 0 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .form-group input { width: 100%; padding: 0.75rem 1rem; background: var(--surface-3); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15); }
    .login-btn { width: 100%; padding: 0.85rem; background: var(--accent-gradient); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 0.5rem; }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:active { transform: scale(0.99); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .error-msg.visible { display: block; }
    .theme-toggle { position: fixed; top: 1.5rem; right: 1.5rem; }
  </style>
</head>
<body>
  <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light theme">🌙</button>
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Customy</span>
    </div>
    <div class="login-card">
      <h1>Welcome back</h1>
      <p>Sign in to your AI-first CMS</p>
      <div class="error-msg" id="errMsg" role="alert"></div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
      </form>
    </div>
  </div>
  <script src="/js/auth.js" type="module"></script>
</body>
</html>
